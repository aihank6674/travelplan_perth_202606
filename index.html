<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 珀斯 & 西澳珊瑚海岸 - 深度家庭探索 (最终确认版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-stone-50 text-stone-800 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-stone-200 shadow-sm flex-none z-30">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-2">
            <div>
                <h1 class="text-lg md:text-2xl font-bold text-stone-800 flex items-center gap-2">
                    <i class="fa-solid fa-earth-oceania text-orange-500"></i> 西澳亲子自驾 (最终确认版)
                </h1>
                <p class="text-xs text-stone-500">2026年6月11日 - 6月23日 | 2大2小</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="generatePackingList()" class="flex items-center gap-2 px-3 py-1.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-full text-xs md:text-sm font-medium hover:shadow-lg transition">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> <span class="hidden md:inline">智能</span>打包
                </button>
            </div>
        </div>
    </header>

    <!-- Modal for Packing List -->
    <div id="packing-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col">
            <div class="p-4 border-b border-stone-100 flex justify-between items-center">
                <h3 class="text-lg font-bold ai-gradient-text flex items-center gap-2">
                    <i class="fa-solid fa-suitcase"></i> AI 智能打包助手
                </h3>
                <button onclick="closePackingModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 text-stone-400 hover:text-stone-600 transition">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar bg-stone-50">
                <div id="packing-loading" class="hidden flex flex-col items-center justify-center py-10">
                    <div class="typing-indicator text-2xl mb-4"><span></span><span></span><span></span></div>
                    <p class="text-stone-500 text-sm">正在分析 6月珀斯天气与行程...</p>
                </div>
                <div id="packing-content" class="prose prose-stone prose-sm max-w-none">
                    <!-- Content injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Layout -->
    <main class="flex-1 flex overflow-hidden max-w-7xl mx-auto w-full relative">
        
        <!-- Sidebar (Timeline) -->
        <aside id="sidebar-panel" class="w-full md:w-1/3 lg:w-1/4 bg-white border-r border-stone-200 overflow-y-auto flex-none z-10 custom-scrollbar relative flex flex-col h-full">
            
            <!-- Filters -->
            <div class="p-4 sticky top-0 bg-white z-20 border-b border-stone-100 shadow-sm">
                <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                    <button onclick="filterDays('all')" class="filter-btn whitespace-nowrap text-xs px-3 py-1.5 rounded-full bg-stone-800 text-white transition shadow-sm" data-filter="all">全部</button>
                    <button onclick="filterDays('roadtrip')" class="filter-btn whitespace-nowrap text-xs px-3 py-1.5 rounded-full bg-stone-100 text-stone-600 hover:bg-stone-200 transition" data-filter="roadtrip">🚗 自驾段</button>
                    <button onclick="filterDays('city')" class="filter-btn whitespace-nowrap text-xs px-3 py-1.5 rounded-full bg-stone-100 text-stone-600 hover:bg-stone-200 transition" data-filter="city">🏙️ 城市段</button>
                </div>
            </div>

            <!-- List -->
            <div id="timeline-list" class="pb-20 md:pb-10 relative flex-1">
                <div class="timeline-line"></div>
                <!-- Overview Item (Fixed at top) -->
                <div onclick="selectOverview()" class="relative pl-4 pr-4 py-4 cursor-pointer hover:bg-orange-50 transition-colors border-b border-stone-100 bg-orange-50/50 group" id="overview-item">
                     <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-map"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-stone-800">行程总览 Overview</h3>
                            <p class="text-xs text-stone-500">路线图 • 统计 • 亮点</p>
                        </div>
                     </div>
                </div>
                <!-- Dynamic Items -->
            </div>
        </aside>

        <!-- Main Detail View -->
        <section id="detail-panel" class="absolute inset-0 md:static w-full md:flex-1 bg-stone-50 overflow-y-auto custom-scrollbar z-20 mobile-hidden transform transition-transform duration-300">
            
            <!-- Mobile Back Button Header -->
            <div class="md:hidden sticky top-0 bg-white/95 backdrop-blur border-b border-stone-200 p-3 z-30 flex items-center shadow-sm">
                <button onclick="showSidebar()" class="flex items-center gap-2 text-sm font-bold text-stone-600 hover:text-orange-500 transition px-2 py-1 rounded-lg active:bg-stone-100">
                    <i class="fa-solid fa-chevron-left"></i> 返回行程表
                </button>
            </div>

            <!-- Content Container -->
            <div id="day-content" class="max-w-4xl mx-auto p-4 md:p-8 fade-in pb-20">
                <!-- Content loaded via JS -->
            </div>
        </section>
    </main>

    <!-- Load Local Itinerary Data and App Logic -->
    <script src="itineraryData.js"></script>
    <script src="app.js"></script>
</body>
</html>
